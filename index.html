<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Profile</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <h2>Private Profile</h2>
        <p>This profile will expire in <span id="timer">60</span> seconds.</p>
        <div class="profile">
            <img src="profile.jpg" alt="Profile Image" class="protected">
            <p class="protected">Name: John Doe</p>
            <p class="protected">Age: 25</p>
            <p class="protected">City: Mumbai</p>
            <p class="protected">Education: B.tech</p>
            <p class="protected">Salery: 5 Lpa</p>
            <p class="protected">Other: .......</p>
        </div>
    </div>
</body>
</html>
